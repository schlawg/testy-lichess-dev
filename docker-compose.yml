version: '3.8'

services:

  mongodb:
    container_name: testy-mongodb
    image: mongo:5.0.15-focal
    networks:
      - lila-network
    ports: 
      - "127.0.0.1:37017:27017"
    volumes:
      - ./lila:/lila
      - ../.testy-db:/data/db
    user: "${UID:-1003}"
    restart: "unless-stopped"

  redis:
    container_name: testy-redis
    image: redis:alpine
    networks:
      - lila-network
    restart: "unless-stopped"

  lila:
    container_name: testy-lila
    image: testy-lila
    working_dir: /lila
    build: 
      context: docker
      dockerfile: lila.Dockerfile
    networks:
      - lila-network
    ports:
      - "127.0.0.1:19663:9663"
    volumes:
      - ./crap/.ivy2:/.ivy2
      - ./crap/.sbt:/.sbt
      - ./crap/.cache:/.cache
      - ./crap/root:/root
      - ./lila:/lila
      - ./lila-fishnet:/lila-fishnet
      - ./lila-db-seed:/lila-db-seed
    user: "${UID:-1003}"
    restart: "no"
    entrypoint: ./lila run

  lila_fishnet:
    container_name: testy-lila-fishnet
    image: sbtscala/scala-sbt:eclipse-temurin-focal-17.0.5_8_1.8.2_3.2.2
    working_dir: /lila-fishnet
    networks:
      - lila-network
    volumes:
      - ./lila-fishnet:/lila-fishnet
    user: "${UID:-1003}"
    restart: "no"
    entrypoint: ./target/universal/stage/bin/lila-fishnet -Dhttp.port=9665 -Dredis.uri="redis://redis"

  lila_ws:
    container_name: testy-lila-ws
    image: testy-lila
    working_dir: /lila-ws
    networks:
      - lila-network
    ports:
      - "127.0.0.1:19664:9664"
    volumes:
      - ./crap/.ivy2:/.ivy2
      - ./crap/.sbt-ws:/.sbt
      - ./crap/.cache:/.cache
      - ./crap/root:/root
      - ./lila-ws:/lila-ws
    user: "${UID:-1003}"
    restart: "no"
    entrypoint: sbt run -Dmongo.uri="mongodb://mongodb" -Dredis.uri="redis://redis" -Dcsrf.origin=${ORIGIN:-https://testy.lichess.dev} -Dcookie.name=testy

  fishnet:
    container_name: testy-fishnet
    image: niklasf/fishnet
    networks:
      - lila-network
    restart: "no"
    entrypoint: /fishnet --endpoint http://lila:9663/fishnet --max-backoff 3

  fishnet-vs:
    container_name: testy-fishnet-vs
    image: niklasf/fishnet
    networks:
      - lila-network
    restart: "no"
    entrypoint: /fishnet --endpoint http://lila_fishnet:9665/fishnet --max-backoff 3

  initdb:
    container_name: testy-initdb
    working_dir: /lila-db-seed
    build:
      context: docker
      dockerfile: initdb.Dockerfile
    networks:
      - lila-network
    volumes:
      - ./lila:/lila
      - ./lila-db-seed:/lila-db-seed
    user: "${UID:-1003}"

networks:
  lila-network:
    driver: bridge
